<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Trade AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d4edd;
            --neon-purple-glow: rgba(157, 78, 221, 0.5);
            --neon-green: #22c55e;
            --neon-green-glow: rgba(34, 197, 94, 0.6);
            --neon-red: #ef4444;
            --neon-red-glow: rgba(239, 68, 68, 0.6);
            --bg-dark: #09050d;
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-dark); 
            color: white; 
            margin: 0; 
            padding: 15px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            min-height: 100vh;
        }

        /* Панель профиля */
        .card { 
            width: 100%;
            background: rgba(25, 15, 40, 0.6); 
            border: 1px solid var(--neon-purple);
            border-radius: 18px; 
            padding: 12px; 
            margin-bottom: 15px; 
            box-shadow: 0 0 15px var(--neon-purple-glow);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        h2 { margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 2px; font-size: 0.85rem; text-align: center; color: #e2d4f0; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-item { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 12px; text-align: center; font-size: 0.8rem; color: #b5a8c4; }
        .stat-item b { display: block; font-size: 1rem; color: #fff; margin-top: 3px; text-shadow: 0 0 8px var(--neon-purple); }

        .section-title { width: 100%; text-align: left; font-size: 0.85rem; color: #a594b8; text-transform: uppercase; letter-spacing: 1px; margin: 10px 0 5px 0; font-weight: 500; }

        /* Выпадающие списки (Стиль 1-й версии) */
        .select-input {
            width: 100%;
            padding: 14px;
            border-radius: 15px;
            background: rgba(30, 15, 50, 0.5);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            border: 2px solid var(--neon-purple);
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.2);
            outline: none;
            cursor: pointer;
            margin-bottom: 12px;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
        }
        .select-input:focus {
            box-shadow: 0 0 18px var(--neon-purple);
        }

        /* Живой график TradingView */
        .chart-container {
            width: 100%;
            height: 220px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(157, 78, 221, 0.3);
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Главная кнопка */
        .main-btn {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            background: var(--neon-purple);
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 15px var(--neon-purple-glow);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }
        .main-btn:active {
            transform: scale(0.98);
            box-shadow: 0 0 25px var(--neon-purple);
        }

        /* Анимация анализа */
        .loader-container {
            display: none;
            flex-direction: column;
            align-items: center;
            margin: 15px 0;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .loader-text { font-size: 1rem; color: #fff; text-shadow: 0 0 10px var(--neon-purple); margin-bottom: 10px; }
        .spinner {
            width: 35px; height: 35px;
            border: 4px solid rgba(157, 78, 221, 0.2);
            border-top: 4px solid var(--neon-purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px var(--neon-purple-glow);
        }

        /* Окно сигнала */
        .signal-window {
            display: none;
            width: 100%;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            transform: scale(0.8);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
        }
        .signal-window.show { display: block; transform: scale(1); opacity: 1; }
        .signal-up { background: rgba(10, 35, 20, 0.7); border: 2px solid var(--neon-green); box-shadow: 0 0 25px var(--neon-green-glow); }
        .signal-down { background: rgba(35, 10, 15, 0.7); border: 2px solid var(--neon-red); box-shadow: 0 0 25px var(--neon-red-glow); }
        
        .sig-pair { font-size: 1.2rem; font-weight: 700; }
        .sig-direction { font-size: 1.8rem; font-weight: 700; text-transform: uppercase; margin: 5px 0; }
        .signal-up .sig-direction { color: var(--neon-green); text-shadow: 0 0 12px var(--neon-green); }
        .signal-down .sig-direction { color: var(--neon-red); text-shadow: 0 0 12px var(--neon-red); }
        .sig-time { font-size: 1rem; color: #eee; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <h2>👤 Панель Трейдера</h2>
        <div class="stat-grid">
            <div class="stat-item">Регистрация<br><b>27.05.2026</b></div>
            <div class="stat-item">Сигналов выдано<br><b>142</b></div>
        </div>
    </div>

    <div class="section-title">Валютная пара:</div>
    <select class="select-input" id="pairSelect" onchange="updateChart()">
        <option value="FX:EURUSD">EUR / USD</option>
        <option value="FX:GBPUSD">GBP / USD</option>
        <option value="BITSTAMP:BTCUSD">BTC / USD</option>
        <option value="BITSTAMP:ETHUSD">ETH / USD</option>
    </select>

    <div class="section-title">Время экспирации:</div>
    <select class="select-input" id="timeSelect">
        <option value="1 МИНУТА">1 МИНУТА</option>
        <option value="3 МИНУТЫ" selected>3 МИНУТЫ</option>
        <option value="5 МИНУТ">5 МИНУТ</option>
        <option value="15 МИНУТ">15 МИНУТ</option>
    </select>

    <div class="section-title">Живой график рынка:</div>
    <div class="chart-container" id="tv-chart">
        </div>

    <button class="main-btn" onclick="startAnalysis()">Получить сигнал 🚀</button>

    <div class="loader-container" id="loader">
        <div class="loader-text">Сканируем индикаторы...</div>
        <div class="spinner"></div>
    </div>

    <div class="signal-window" id="signalWindow">
        <div class="sig-pair" id="targetPair">EUR/USD</div>
        <div class="sig-direction" id="targetDirection">ВВЕРХ ↑</div>
        <div class="sig-time">Время: <span id="targetTime" style="font-weight: bold;">3 МИНУТЫ</span></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let widget = null;

        // Функция обновления графика при смене пары
        function updateChart() {
            const selectedPair = document.getElementById('pairSelect').value;
            
            widget = new TradingView.widget({
                "width": "100%",
                "height": "100%",
                "symbol": selectedPair,
                "interval": "1",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "ru",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": true,
                "allow_symbol_change": false,
                "container_id": "tv-chart"
            });
        }

        // Запуск анализа рынка
        function startAnalysis() {
            const loader = document.getElementById('loader');
            const signalWindow = document.getElementById('signalWindow');
            const pairSelect = document.getElementById('pairSelect');
            const timeSelect = document.getElementById('timeSelect');
            
            signalWindow.style.display = 'none';
            signalWindow.classList.remove('show');
            
            loader.style.display = 'flex';
            setTimeout(() => { loader.style.opacity = '1'; }, 50);

            // Имитация ИИ-анализа индикаторов
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 400);

                const directions = ['UP', 'DOWN'];
                const randomDir = directions[Math.floor(Math.random() * directions.length)];
                
                const currentPairText = pairSelect.options[pairSelect.selectedIndex].text;
                const currentTimeText = timeSelect.value;

                document.getElementById('targetPair').innerText = currentPairText;
                document.getElementById('targetTime').innerText = currentTimeText;

                signalWindow.className = 'signal-window';
                
                if (randomDir === 'UP') {
                    signalWindow.classList.add('signal-up');
                    document.getElementById('targetDirection').innerText = 'ВВЕРХ ↑';
                } else {
                    signalWindow.classList.add('signal-down');
                    document.getElementById('targetDirection').innerText = 'ВНИЗ ↓';
                }

                signalWindow.style.display = 'block';
                setTimeout(() => { signalWindow.classList.add('show'); }, 50);

            }, 2300);
        }

        // Инициализация при старте додатка
        window.onload = function() {
            updateChart();
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        };
    </script>
</body>
</html>
