<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Trade AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d4edd;
            --neon-purple-glow: rgba(157, 78, 221, 0.6);
            --neon-green: #22c55e;
            --neon-green-glow: rgba(34, 197, 94, 0.6);
            --neon-red: #ef4444;
            --neon-red-glow: rgba(239, 68, 68, 0.6);
            --bg-dark: #09050d;
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-dark); 
            color: white; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Личный кабинет */
        .card { 
            width: 100%;
            background: rgba(25, 15, 40, 0.6); 
            border: 2px solid var(--neon-purple);
            border-radius: 20px; 
            padding: 15px; 
            margin-bottom: 20px; 
            box-shadow: 0 0 20px var(--neon-purple-glow);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        h2 { margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; text-align: center; color: #e2d4f0; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 15px; text-align: center; font-size: 0.85rem; color: #b5a8c4; }
        .stat-item b { display: block; font-size: 1.1rem; color: #fff; margin-top: 5px; text-shadow: 0 0 8px var(--neon-purple); }

        .section-title { font-size: 0.9rem; color: #a594b8; text-transform: uppercase; letter-spacing: 1px; margin: 10px 0; font-weight: 500; }

        /* Сетка выбора пар */
        .pairs-container { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        
        .pair-btn { 
            padding: 16px; 
            border-radius: 18px; 
            background: rgba(30, 15, 50, 0.4); 
            color: white; 
            font-weight: 700; 
            font-size: 1rem;
            cursor: pointer;
            border: 2px solid var(--neon-purple); 
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pair-btn:hover, .pair-btn:active {
            background: var(--neon-purple);
            box-shadow: 0 0 20px var(--neon-purple);
            transform: translateY(-2px);
        }

        /* Элемент загрузки (Анализ рынка) */
        .loader-container {
            display: none;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .loader-text {
            font-size: 1.1rem;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-purple);
            margin-bottom: 15px;
            font-weight: 500;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(157, 78, 221, 0.2);
            border-top: 4px solid var(--neon-purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px var(--neon-purple-glow);
        }

        /* Окно с результатом Сигнала */
        .signal-window {
            display: none;
            width: 100%;
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            box-sizing: border-box;
            transform: scale(0.8);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .signal-window.show {
            display: block;
            transform: scale(1);
            opacity: 1;
        }

        /* Стили для разных направлений */
        .signal-up {
            background: rgba(10, 35, 20, 0.7);
            border: 3px solid var(--neon-green);
            box-shadow: 0 0 30px var(--neon-green-glow);
        }

        .signal-down {
            background: rgba(35, 10, 15, 0.7);
            border: 3px solid var(--neon-red);
            box-shadow: 0 0 30px var(--neon-red-glow);
        }

        .sig-pair { font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 5px; }
        .sig-direction { font-size: 2rem; font-weight: 700; text-transform: uppercase; margin: 10px 0; }
        .signal-up .sig-direction { color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); }
        .signal-down .sig-direction { color: var(--neon-red); text-shadow: 0 0 15px var(--neon-red); }
        
        .sig-info { font-size: 0.9rem; color: #ccc; margin-top: 10px; }
        .sig-time { font-size: 1.1rem; font-weight: bold; color: #fff; }

        /* Анимации */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <h2>👤 Панель Трейдера</h2>
        <div class="stat-grid">
            <div class="stat-item">Регистрация<br><b>27.05.2026</b></div>
            <div class="stat-item">Сигналов выдано<br><b>142</b></div>
        </div>
    </div>

    <div class="section-title">Выбор торговой пары:</div>

    <div class="pairs-container">
        <button class="pair-btn" onclick="generateSignal('EUR/USD')">EUR/USD</button>
        <button class="pair-btn" onclick="generateSignal('GBP/USD')">GBP/USD</button>
        <button class="pair-btn" onclick="generateSignal('BTC/USD')">BTC/USD</button>
        <button class="pair-btn" onclick="generateSignal('ETH/USD')">ETH/USD</button>
    </div>

    <div class="loader-container" id="loader">
        <div class="loader-text">Анализируем рынок...</div>
        <div class="spinner"></div>
    </div>

    <div class="signal-window" id="signalWindow">
        <div class="sig-pair" id="targetPair">EUR/USD</div>
        <div class="sig-direction" id="targetDirection">ВВЕРХ ↑</div>
        <div class="sig-info">Время экспирации: <span class="sig-time">3 МИНУТЫ</span></div>
    </div>

    <script>
        function generateSignal(pair) {
            const loader = document.getElementById('loader');
            const signalWindow = document.getElementById('signalWindow');
            
            // Прячем старый сигнал, если он был открыт
            signalWindow.style.display = 'none';
            signalWindow.classList.remove('show');
            
            // Включаем плавную анимацию загрузки
            loader.style.display = 'flex';
            setTimeout(() => { loader.style.opacity = '1'; }, 50);

            // Имитируем умный ИИ-анализ на 2.5 секунды
            setTimeout(() => {
                // Плавное скрытие лоадера
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 400);

                // Рандомим направление: ВВЕРХ или ВНИЗ
                const directions = ['UP', 'DOWN'];
                const randomDir = directions[Math.floor(Math.random() * directions.length)];
                
                const targetPair = document.getElementById('targetPair');
                const targetDirection = document.getElementById('targetDirection');
                
                targetPair.innerText = pair;

                // Настраиваем неоновые стили окна результатов
                signalWindow.className = 'signal-window'; // сброс старых классов
                
                if (randomDir === 'UP') {
                    signalWindow.classList.add('signal-up');
                    targetDirection.innerText = 'ВВЕРХ ↑';
                } else {
                    signalWindow.classList.add('signal-down');
                    targetDirection.innerText = 'ВНИЗ ↓';
                }

                // Эффектное появление неонового окна
                signalWindow.style.display = 'block';
                setTimeout(() => {
                    signalWindow.classList.add('show');
                }, 50);

            }, 2500);
        }
        
        // Сообщаем Телеграму, что приложение готово
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
