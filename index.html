<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Trade AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d4edd;
            --neon-green: #22c55e;
            --neon-red: #ef4444;
            --bg-dark: #0f0a14;
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-dark); 
            color: white; 
            margin: 0; 
            padding: 20px; 
            overflow-x: hidden;
        }

        .card { 
            background: rgba(30, 20, 45, 0.7); 
            border: 1px solid var(--neon-purple);
            border-radius: 25px; 
            padding: 20px; 
            margin-bottom: 25px; 
            box-shadow: 0 0 20px rgba(157, 78, 221, 0.3);
            backdrop-filter: blur(10px);
        }

        h2 { color: #fff; text-transform: uppercase; letter-spacing: 2px; font-size: 1rem; margin-bottom: 15px; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; text-align: center; }
        .stat-item b { display: block; font-size: 1.2rem; color: var(--neon-purple); }

        .pair-btn { 
            width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 20px; 
            background: #1a1a2e; color: white; font-weight: 700; cursor: pointer;
            border: 2px solid #333; transition: all 0.3s ease;
        }

        /* Неонові стани */
        .btn-up { border-color: var(--neon-green); box-shadow: 0 0 15px var(--neon-green); }
        .btn-down { border-color: var(--neon-red); box-shadow: 0 0 15px var(--neon-red); }

        .desc { font-size: 0.9rem; color: #a5a5a5; margin-bottom: 20px; line-height: 1.5; }
        
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        .pulse { animation: pulse 2s infinite; }
    </style>
</head>
<body>

    <div class="card">
        <h2>👤 Личный кабинет</h2>
        <div class="stat-grid">
            <div class="stat-item">Дата регистрации<br><b>27.05.2026</b></div>
            <div class="stat-item">Всего сигналов<br><b>142</b></div>
        </div>
    </div>

    <div class="desc pulse">
        🚀 AI-анализатор активирован. Наш алгоритм сканирует рынок в режиме реального времени. Выбирай актив, чтобы получить прогноз движения цены.
    </div>

    <!-- Кнопки з ефектами -->
    <button class="pair-btn btn-up" onclick="getSignal('EUR/USD', 'UP')">EUR/USD 📈</button>
    <button class="pair-btn btn-down" onclick="getSignal('GBP/USD', 'DOWN')">GBP/USD 📉</button>
    <button class="pair-btn" onclick="getSignal('BTC/USD', '⚡')">BTC/USD ⚡</button>

    <script>
        function getSignal(pair, type) {
            // Тут додамо анімацію при натисканні
            const btn = event.target;
            btn.style.transform = "scale(0.95)";
            setTimeout(() => btn.style.transform = "scale(1)", 200);
            
            console.log("Запуск аналізу для:", pair);
        }
    </script>
</body>
</html>
